<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>BLINDPATH</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Title Screen -->
  <div id="title-screen">
    <div id="title-box">
      <div id="title-logo">BLINDPATH</div>
      <div id="title-sub">Learn by falling.</div>
      <button id="start-btn">START</button>
      <button id="continue-btn" class="hidden">CONTINUE</button>
    </div>
  </div>

  <!-- Game Container -->
  <div id="game-wrapper" class="hidden">
    <div id="game-viewport">
      <div id="game-world"></div>
      <!-- UI overlays -->
      <div id="level-title-overlay"></div>
      <div id="death-counter">✝ <span id="death-count">0</span></div>
      <div id="flash-overlay"></div>
    </div>

    <!-- Mobile touch controls -->
    <div id="touch-controls">
      <div id="touch-dpad">
        <div id="touch-left" class="touch-btn" aria-label="Move Left">◀</div>
        <div id="touch-right" class="touch-btn" aria-label="Move Right">▶</div>
      </div>
      <div id="touch-jump" class="touch-btn" aria-label="Jump">▲</div>
    </div>
  </div>

  <!-- Completion Screen (Phase 3 true ending uses this) -->
  <div id="end-screen" class="hidden">
    <div id="end-box">
      <div id="end-title">— PATH CLEARED —</div>
      <div id="end-deaths"></div>
      <button id="restart-btn">RESTART</button>
    </div>
  </div>

  <!-- Fake Ending Screen (shown after Phase 1 / Level 30) -->
  <div id="fake-end-screen" class="hidden">
    <div id="fake-end-box">
      <div id="fake-end-title">— path cleared —</div>
      <div id="fake-end-sub">you found the way through.</div>
      <div id="fake-end-rest">every step was yours.</div>
      <button id="fake-continue-btn">. . .</button>
    </div>
  </div>

  <!-- Wake Transition (between Phase 2 and Phase 3) -->
  <div id="wake-screen" class="hidden"></div>

  <!-- True Ending Screen (after Phase 3 / Level 30) -->
  <div id="true-end-screen" class="hidden">
    <div id="true-end-box">
      <div id="true-end-title">— — —</div>
      <div id="true-end-line">every path leads somewhere.</div>
      <div id="true-end-sub">even the ones that hurt.</div>
      <div id="true-end-deaths"></div>
      <button id="true-restart-btn">begin again</button>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
